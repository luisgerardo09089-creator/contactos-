<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    font-family: Arial;
}

table {
    margin-top: 20px;
    border-collapse: collapse;
    width: 60%;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}
</style>

</head>
<body>

<h2>Contacto</h2>

<form id="formulario">
    Nombre: <input type="text" id="nombre" required>
    Apellido: <input type="text" id="apellido" required>
    Teléfono: <input type="tel" id="telefono" required>
    <button type="submit">Enviar</button>
</form>

<!-- TABLA (IMPORTANTE) -->
<table id="tabla">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Teléfono</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault(); // EVITA QUE SE RECARGUE LA PÁGINA

    let nombre = document.getElementById("nombre").value;
    let apellido = document.getElementById("apellido").value;
    let telefono = document.getElementById("telefono").value;

    let tabla = document.getElementById("tabla").getElementsByTagName("tbody")[0];

    let fila = tabla.insertRow();

    fila.insertCell(0).textContent = nombre;
    fila.insertCell(1).textContent = apellido;
    fila.insertCell(2).textContent = telefono;

    // Limpia el formulario
    document.getElementById("formulario").reset();
});
</script>

</body>
</html>
