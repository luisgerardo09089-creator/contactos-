<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contacto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .form-container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #28a745;
            color: white;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Contacto</h2>

    <form id="contactForm">
        <label>Nombre:</label>
        <input type="text" id="nombre" required>

        <label>Apellido:</label>
        <input type="text" id="apellido" required>

        <label>Teléfono:</label>
        <input type="tel" id="telefono" required>

        <button type="submit">Enviar</button>
    </form>

    <!-- Tabla -->
    <table id="tablaDatos">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let apellido = document.getElementById("apellido").value;
    let telefono = document.getElementById("telefono").value;

    let tabla = document.getElementById("tablaDatos").getElementsByTagName("tbody")[0];

    let nuevaFila = tabla.insertRow();

    nuevaFila.insertCell(0).textContent = nombre;
    nuevaFila.insertCell(1).textContent = apellido;
    nuevaFila.insertCell(2).textContent = telefono;

    // Limpiar formulario
    document.getElementById("contactForm").reset();
});
</script>

</body>
</html>
